name: Refresh tráfego (3h)

on:
  schedule:
    - cron: '0 */3 * * *'    # a cada 3 horas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tráfego (data.js)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode traffic
      - name: Commit se mudou
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if (git status --porcelain data.js) {
            git commit -m ("auto: trafego " + (Get-Date -Format 'yyyy-MM-dd HH:mm'))
            git pull --rebase origin main
            git push
          } else { Write-Host "sem mudancas" }
